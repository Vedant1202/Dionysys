                            exclusiveMinimum: 0
                            type: integer
                          persistenceMode:
                            enum:
                              - memory
                              - tab
                              - browser
                            type: string
                          pollingIntervalMs:
                            exclusiveMinimum: 0
                            type: integer
                          presentationMode:
                            enum:
                              - prototype
                              - production
                            type: string
                        required:
                          - defaultMode
                          - presentationMode
                          - decisionApplication
                          - persistenceMode
                          - minEventsBeforeLock
                          - pollingIntervalMs
                        type: object
                      ui:
                        properties:
                          supportedMenuItems:
                            items:
                              type: string
                            type: array
                          supportedTools:
                            items:
                              type: string
                            type: array
                        required:
                          - supportedTools
                          - supportedMenuItems
                        type: object
                      updatedAt:
                        minLength: 1
                        type: string
                      version:
                        enum:
                          - 1
                        type: number
                    required:
                      - version
                      - updatedAt
                      - mode
                      - deterministic
                      - mcp
                      - ui
                      - feedbackWeights
                    type: object
                  success:
                    type: boolean
                required:
                  - success
                  - config
                type: object
          description: Reset admin configuration object
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Admin console is disabled
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Internal error
      summary: Reset admin configuration to file defaults
      tags:
        - Admin
  /api/dionysys/decisions:resolve:
    post:
      description: Preferred SDK route. The server also accepts
        /api/dionysys/decisions/resolve as a compatibility alias.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DionysysDecisionResolve"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysDecision"
          description: Resolved decision
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Validation error
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Internal error
      summary: Resolve an adaptive decision
      tags:
        - Decisions
  /api/dionysys/events:
    post:
      description: Accepts a single event object or an array of events.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DionysysEvent"
      responses:
        "202":
          description: Events accepted
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Validation error
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Internal error
      summary: Ingest events
      tags:
        - Events
  /api/dionysys/feedback:
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                comment:
                  type: string
                sentiment:
                  enum:
                    - helpful
                    - in_the_way
                  type: string
                sessionId:
                  minLength: 1
                  type: string
              required:
                - sessionId
                - sentiment
              type: object
      responses:
        "200":
          description: Feedback submitted and graph recommendation returned
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Validation error
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: No applied decision found for session
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Internal error
      summary: Submit explicit user feedback
      tags:
        - Feedback
  /api/dionysys/feedback/evaluate:
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                sessionId:
                  minLength: 1
                  type: string
              required:
                - sessionId
              type: object
      responses:
        "200":
          description: Evaluation result
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Validation error
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: No applied decision found for session
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Internal error
      summary: Trigger passive feedback evaluation
      tags:
        - Feedback
  /api/dionysys/sessions:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DionysysSessionCreate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysSession"
          description: Created session
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Validation error
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Internal error
      summary: Create a session
      tags:
        - Sessions
  /api/dionysys/sessions/{sessionId}:
    delete:
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            minLength: 1
            type: string
      responses:
        "204":
          description: Session deleted
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Internal error
      summary: Delete a session
      tags:
        - Sessions
    get:
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysSession"
          description: Session found
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Session not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Internal error
      summary: Get a session
      tags:
        - Sessions
    patch:
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            minLength: 1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DionysysSessionUpdate"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysSession"
          description: Updated session
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Validation error
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Session not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Internal error
      summary: Update session metadata
      tags:
        - Sessions
  /api/dionysys/sessions/{sessionId}/end:
    post:
      parameters:
        - in: path
          name: sessionId
          required: true
          schema:
            minLength: 1
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysSession"
          description: Ended session
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Session not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DionysysApiError"
          description: Internal error
      summary: End a session
      tags:
        - Sessions
servers:
  - description: Dionysys backend
    url: "{baseUrl}"
    variables:
      baseUrl:
        default: http://localhost:3001
        description: Base URL of the Dionysys backend server.
webhooks: {}
